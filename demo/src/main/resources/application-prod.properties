# MS SQL Server Database Configuration for Production Profile
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=db_bun_bo;encrypt=true;trustServerCertificate=true
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=YourStrongPasswordHere123

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
