<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - Bún Bò Gia Truyền</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-cream) 0%, #F5EBE0 100%);
            padding: 20px;
        }
        .auth-wrapper {
            width: 100%;
            max-width: 480px;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 40px rgba(192, 57, 43, 0.12);
            border: 1px solid rgba(234, 219, 200, 0.6);
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }
        .auth-header {
            text-align: center;
            margin-bottom: 26px;
        }
        .auth-logo {
            font-size: 36px;
            color: var(--primary);
            margin-bottom: 8px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        .auth-title {
            font-size: 24px;
            color: var(--text-dark);
            font-weight: 700;
            margin-bottom: 4px;
        }
        .auth-subtitle {
            font-size: 14px;
            color: var(--text-light);
        }
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-dark);
        }
        .input-icon-wrapper {
            position: relative;
        }
        .input-icon-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 16px;
            transition: color 0.3s;
        }
        .form-control {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 15px;
            color: var(--text-dark);
            background: #FAFAFA;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(192, 57, 43, 0.1);
        }
        .form-control:focus + i {
            color: var(--primary);
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(192, 57, 43, 0.3);
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(192, 57, 43, 0.4);
        }
        .btn-auth:active {
            transform: translateY(0);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-light);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
            margin-left: 5px;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-light);
            font-weight: 500;
            font-size: 14px;
            transition: color 0.3s;
        }
        .back-home:hover {
            color: var(--primary);
        }
        .alert-box {
            padding: 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.4s ease;
        }
        .alert-error {
            background: #FFEBEE;
            color: #C62828;
            border: 1px solid #FFCDD2;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo"><i class="fa-solid fa-user-plus"></i></div>
                <h2 class="auth-title">Đăng Ký Tài Khoản</h2>
                <p class="auth-subtitle">Trở thành thành viên để tích điểm & nhận nhiều ưu đãi</p>
            </div>

            <!-- Alerts -->
            <div th:if="${param.error != null && param.error[0] == 'username_exists'}" class="alert-box alert-error">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>Tên đăng nhập này đã được sử dụng! Vui lòng chọn tên khác.</span>
            </div>
            <div th:if="${param.error != null && param.error[0] == 'password_mismatch'}" class="alert-box alert-error">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>Mật khẩu xác nhận không khớp! Vui lòng thử lại.</span>
            </div>

            <form th:action="@{/register}" method="post" id="registerForm" onsubmit="return validateRegisterForm();">
                <div class="form-group">
                    <label for="fullName">Họ và tên</label>
                    <div class="input-icon-wrapper">
                        <input type="text" id="fullName" name="fullName" class="form-control" placeholder="Ví dụ: Nguyễn Văn A" required autofocus>
                        <i class="fa-solid fa-id-card"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <div class="input-icon-wrapper">
                        <input type="text" id="username" name="username" class="form-control" placeholder="Tên đăng nhập tối thiểu 4 ký tự..." required minlength="4">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-icon-wrapper">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Mật khẩu tối thiểu 6 ký tự..." required minlength="6">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <div class="input-icon-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu ở trên..." required>
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <span id="passwordError" style="color: #C62828; font-size: 13px; margin-top: 4px; display: none;"><i class="fa-solid fa-triangle-exclamation"></i> Mật khẩu xác nhận không trùng khớp!</span>
                </div>

                <button type="submit" class="btn-auth">
                    <span>Hoàn Tất Đăng Ký</span>
                    <i class="fa-solid fa-check-circle"></i>
                </button>
            </form>

            <div class="auth-footer">
                Đã có tài khoản? <a href="/login">Đăng nhập ngay <i class="fa-solid fa-angle-right"></i></a>
            </div>
        </div>

        <a href="/" class="back-home"><i class="fa-solid fa-arrow-left"></i> Quay lại Trang chủ</a>
    </div>

    <script>
        function validateRegisterForm() {
            const pwd = document.getElementById('password').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            const errSpan = document.getElementById('passwordError');
            if (pwd !== confirmPwd) {
                errSpan.style.display = 'block';
                document.getElementById('confirmPassword').focus();
                return false;
            }
            errSpan.style.display = 'none';
            return true;
        }
    </script>
</body>
</html>
