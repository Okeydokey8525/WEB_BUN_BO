<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Bún Bò Gia Truyền'"></title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- NAVBAR (COMMON FOR CUSTOMER SIDE) -->
    <header class="navbar" th:fragment="navbar">
        <a href="/" class="navbar-brand">
            <i class="fa-solid fa-bowl-hot"></i>
            <span>Bún Bò <span>Gia Truyền</span></span>
        </a>
        <nav>
            <ul class="navbar-links">
                <li><a href="/"><i class="fa-solid fa-house"></i> Trang chủ</a></li>
                <li><a href="/menu"><i class="fa-solid fa-utensils"></i> Thực đơn</a></li>
                <li class="cart-icon-btn" onclick="toggleCartSidebar()">
                    <a>
                        <i class="fa-solid fa-shopping-cart"></i> Giỏ hàng
                        <span id="cart-badge-count" class="cart-badge" style="display:none;">0</span>
                    </a>
                </li>
                <li th:if="${#authorization.expression('isAnonymous()')}">
                    <a href="/login" class="btn-nav-admin"><i class="fa-solid fa-sign-in-alt"></i> Đăng nhập</a>
                </li>
                <li th:if="${#authorization.expression('isAuthenticated()')}">
                    <form th:action="@{/logout}" method="post" style="display:inline;">
                        <button type="submit" class="btn-nav-admin" style="background: none; border: none; cursor: pointer; color: white;">
                            <i class="fa-solid fa-sign-out-alt"></i> Đăng xuất
                        </button>
                    </form>
                </li>
            </ul>
        </nav>
    </header>

    <!-- NAVBAR (ADMIN/STAFF SIDE) -->
    <header class="navbar" th:fragment="header">
        <a href="/" class="navbar-brand">
            <i class="fa-solid fa-bowl-hot"></i>
            <span>Bún Bò <span>Quản Lý</span></span>
        </a>
        <nav>
            <ul class="navbar-links">
                <li th:if="${#authorization.expression('hasRole(''ADMIN'')')}"><a href="/admin/dashboard"><i class="fa-solid fa-chart-bar"></i> Quản lý chung</a></li>
                <li th:if="${#authorization.expression('hasAnyRole(''ADMIN'', ''CASHIER'')')}"><a href="/cashier/dashboard"><i class="fa-solid fa-cash-register"></i> Thu ngân</a></li>
                <li th:if="${#authorization.expression('hasAnyRole(''ADMIN'', ''WAITER'')')}"><a href="/waiter/dashboard"><i class="fa-solid fa-walking"></i> Phục vụ</a></li>
                <li th:if="${#authorization.expression('hasAnyRole(''ADMIN'', ''KITCHEN'')')}"><a href="/kitchen/dashboard"><i class="fa-solid fa-fire"></i> Bếp</a></li>
                <li th:if="${#authorization.expression('hasAnyRole(''ADMIN'', ''INVENTORY'')')}"><a href="/admin/inventory"><i class="fa-solid fa-boxes"></i> Kho</a></li>
                <li th:if="${#authorization.expression('isAuthenticated()')}">
                    <form th:action="@{/logout}" method="post" style="display:inline;">
                        <button type="submit" class="btn-nav-admin" style="background: none; border: none; cursor: pointer; color: white; padding: 0;">
                            <i class="fa-solid fa-sign-out-alt"></i> Đăng xuất
                        </button>
                    </form>
                </li>
            </ul>
        </nav>
    </header>

</body>
</html>
