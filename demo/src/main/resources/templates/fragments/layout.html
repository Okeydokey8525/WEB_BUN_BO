<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Bún Bò Gia Truyền'"></title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- NAVBAR (COMMON FOR CUSTOMER SIDE) -->
    <header class="navbar" th:fragment="navbar">
        <a href="/" class="navbar-brand">
            <i class="fa-solid fa-bowl-hot"></i>
            <span>Bún Bò <span>Gia Truyền</span></span>
        </a>
        <nav>
            <ul class="navbar-links">
                <li><a href="/"><i class="fa-solid fa-house"></i> Trang chủ</a></li>
                <li><a href="/menu"><i class="fa-solid fa-utensils"></i> Thực đơn</a></li>
                <li class="cart-icon-btn" onclick="toggleCartSidebar()">
                    <a>
                        <i class="fa-solid fa-shopping-cart"></i> Giỏ hàng
                        <span id="cart-badge-count" class="cart-badge" style="display:none;">0</span>
                    </a>
                </li>
                <li><a href="/admin/dashboard" class="btn-nav-admin"><i class="fa-solid fa-user-tie"></i> Nhân viên POS</a></li>
            </ul>
        </nav>
    </header>

</body>
</html>
