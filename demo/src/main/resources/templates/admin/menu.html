<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý thực đơn - Bún Bò Gia Truyền</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="admin-layout">
        
        <!-- Sidebar Navigation -->
        <aside th:replace="fragments/layout :: admin_sidebar('menu')"></aside>

        <!-- Main Content -->
        <main class="admin-content" style="display:grid; grid-template-columns: 1fr 350px; gap: 2rem;">
            
            <!-- TOPBAR SPANNING FULL WIDTH -->
            <div style="grid-column: 1 / -1;">
                <div th:replace="fragments/layout :: admin_topbar('Quản Lý Thực Đơn', 'Tìm kiếm nhanh tên món, đơn giá...')"></div>
            </div>

            <!-- LEFT COLUMN: DISH LIST -->
            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="margin: 0; font-size:1.8rem;"><i class="fa-solid fa-utensils"></i> Danh Sách Thực Đơn</h2>
                </div>
                
                <!-- ADVANCED SEARCH & FILTER SUITE -->
                <div class="advanced-filter-suite">
                    <div class="filter-row">
                        <div class="filter-search-input">
                            <i class="fa-solid fa-search"></i>
                            <input type="text" id="menuFilterKeyword" placeholder="Tìm kiếm tên món ăn..." oninput="applyMenuFilters()">
                        </div>
                        <div class="filter-controls">
                            <select id="menuFilterPrice" class="filter-select" onchange="applyMenuFilters()">
                                <option value="all">⚡ Tất cả mức giá</option>
                                <option value="under35">💰 Dưới 35,000 đ</option>
                                <option value="35to55">💰 35,000 đ - 55,000 đ</option>
                                <option value="above55">💰 Trên 55,000 đ</option>
                            </select>
                            <select id="menuSortOrder" class="filter-select" onchange="applyMenuFilters()">
                                <option value="default">↕️ Sắp xếp mặc định</option>
                                <option value="price-asc">💵 Giá tăng dần</option>
                                <option value="price-desc">💵 Giá giảm dần</option>
                                <option value="name-asc">🔤 Tên A - Z</option>
                            </select>
                        </div>
                    </div>
                    <div class="filter-tabs" id="categoryTabs">
                        <button type="button" class="filter-tab-btn active" onclick="setCategoryTab('all', this)">Tất cả món</button>
                        <button type="button" class="filter-tab-btn" onclick="setCategoryTab('Bún Bò', this)">🍜 Bún Bò</button>
                        <button type="button" class="filter-tab-btn" onclick="setCategoryTab('Món thêm', this)">🥟 Món thêm</button>
                        <button type="button" class="filter-tab-btn" onclick="setCategoryTab('Nước uống', this)">🥤 Nước uống</button>
                    </div>
                </div>
                
                <table class="admin-table" id="adminMenuTable">
                    <thead>
                        <tr>
                            <th>Ảnh</th>
                            <th>Tên món</th>
                            <th>Phân loại</th>
                            <th>Đơn giá</th>
                            <th>Trạng thái bán</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="menuTableBody">
                        <tr th:each="dish : ${dishes}" class="dish-row" th:data-id="${dish.id}" th:data-name="${dish.name}" th:data-category="${dish.category}" th:data-price="${dish.price}" th:data-image="${dish.imageUrl}">
                            <td>
                                <img th:if="${dish.imageUrl != null && !dish.imageUrl.isEmpty()}" th:src="${dish.imageUrl}" alt="food" style="width: 50px; height: 50px; object-fit: cover; border-radius: var(--radius-sm);">
                                <div th:unless="${dish.imageUrl != null && !dish.imageUrl.isEmpty()}" style="width: 50px; height: 50px; background-color:#EEE; display:flex; align-items:center; justify-content:center; border-radius: var(--radius-sm);">
                                    <i class="fa-solid fa-bowl-rice" style="color:var(--text-light);"></i>
                                </div>
                            </td>
                            <td><strong th:text="${dish.name}">Bún Bò Tái Nạm</strong></td>
                            <td th:text="${dish.category}">Bún Bò</td>
                            <td th:text="${#numbers.formatDecimal(dish.price, 0, 'COMMA', 0, 'POINT')} + ' đ'" style="font-weight: 700; color:var(--primary);">55,000 đ</td>
                            <td>
                                <!-- Active status toggle -->
                                <form th:action="@{/admin/menu/toggle/{id}(id=${dish.id})}" method="post">
                                    <button type="submit" class="qty-btn" style="width:auto; height:auto; padding: 0.25rem 0.75rem; border-radius:var(--radius-sm); border:none; font-weight:600; cursor:pointer;"
                                            th:classappend="${dish.isAvailable} ? 'status-completed' : 'status-cancelled'"
                                            th:text="${dish.isAvailable ? 'Đang bán' : 'Ngưng bán'}">
                                        Đang bán
                                    </button>
                                </form>
                            </td>
                            <td>
                                <div style="display:flex; gap:0.5rem;">
                                    <button type="button" class="btn-secondary" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;"
                                            onclick="editDishFromRow(this.closest('tr'))">
                                        Sửa
                                    </button>
                                    <form th:action="@{/admin/menu/delete/{id}(id=${dish.id})}" method="post" onsubmit="return confirm('Bạn chắc chắn muốn xóa món này chứ?')">
                                        <button type="submit" class="btn-secondary" style="padding: 0.3rem 0.6rem; font-size: 0.8rem; border-color:var(--danger); color:var(--danger);">
                                            Xóa
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- RIGHT COLUMN: ADD/EDIT FORM -->
            <div>
                <div style="background-color: white; padding: 2rem; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); position:sticky; top: 100px;">
                    <h3 id="form-title" style="margin-bottom: 1.5rem; font-size:1.3rem; color:var(--primary); border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                        <i class="fa-solid fa-plus-circle"></i> Thêm Món Mới
                    </h3>
                    
                    <form action="/admin/menu/save" method="post">
                        <!-- Hidden ID field for edit mode -->
                        <input type="hidden" name="id" id="dish-id">

                        <div style="margin-bottom: 1rem;">
                            <label style="display:block; font-weight:600; margin-bottom:0.25rem;">Tên món ăn:</label>
                            <input type="text" name="name" id="dish-name" required placeholder="Nhập tên món ăn..." 
                                   style="width: 100%; padding: 0.6rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                        </div>

                        <div style="margin-bottom: 1rem;">
                            <label style="display:block; font-weight:600; margin-bottom:0.25rem;">Giá bán (đ):</label>
                            <input type="number" name="price" id="dish-price" required placeholder="Ví dụ: 50000" 
                                   style="width: 100%; padding: 0.6rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                        </div>

                        <div style="margin-bottom: 1rem;">
                            <label style="display:block; font-weight:600; margin-bottom:0.25rem;">Phân loại:</label>
                            <select name="category" id="dish-category" style="width: 100%; padding: 0.6rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                                <option value="Bún Bò">Bún Bò</option>
                                <option value="Món thêm">Món thêm</option>
                                <option value="Nước uống">Nước uống</option>
                            </select>
                        </div>

                        <div style="margin-bottom: 1.5rem;">
                            <label style="display:block; font-weight:600; margin-bottom:0.25rem;">Link ảnh minh họa:</label>
                            <input type="text" name="imageUrl" id="dish-image" placeholder="URL hình ảnh (nếu có)..." 
                                   style="width: 100%; padding: 0.6rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                        </div>

                        <div style="display:flex; flex-direction:column; gap:0.5rem;">
                            <button type="submit" class="btn-primary" style="justify-content: center;">
                                <i class="fa-solid fa-save"></i> Lưu món ăn
                            </button>
                            <button type="button" id="btn-cancel-edit" onclick="resetForm()" class="btn-secondary" style="display:none; justify-content: center;">
                                Hủy sửa
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
        </main>
    </div>

    <!-- JS Helper for editing -->
    <script th:inline="javascript">
        function editDishFromRow(row) {
            if (!row) return;
            const id = row.getAttribute('data-id');
            const name = row.getAttribute('data-name') || '';
            const price = row.getAttribute('data-price') || 0;
            const category = row.getAttribute('data-category') || 'Bún Bò';
            const imageUrl = row.getAttribute('data-image') || '';
            
            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Cập Nhật Món Ăn';
            document.getElementById('dish-id').value = id;
            document.getElementById('dish-name').value = name;
            document.getElementById('dish-price').value = price;
            document.getElementById('dish-category').value = category;
            document.getElementById('dish-image').value = (imageUrl === 'null' || imageUrl === 'undefined') ? '' : imageUrl;
            
            document.getElementById('btn-cancel-edit').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function editDish(id, name, price, category, imageUrl) {
            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Cập Nhật Món Ăn';
            document.getElementById('dish-id').value = id;
            document.getElementById('dish-name').value = name;
            document.getElementById('dish-price').value = price;
            document.getElementById('dish-category').value = category;
            document.getElementById('dish-image').value = (imageUrl === 'null' || imageUrl === 'undefined') ? '' : imageUrl;
            
            document.getElementById('btn-cancel-edit').style.display = 'block';
        }

        function resetForm() {
            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-plus-circle"></i> Thêm Món Mới';
            document.getElementById('dish-id').value = '';
            document.getElementById('dish-name').value = '';
            document.getElementById('dish-price').value = '';
            document.getElementById('dish-category').value = 'Bún Bò';
            document.getElementById('dish-image').value = '';
            
            document.getElementById('btn-cancel-edit').style.display = 'none';
        }

        let currentCategoryTab = 'all';
        function setCategoryTab(cat, btn) {
            currentCategoryTab = cat;
            document.querySelectorAll('#categoryTabs .filter-tab-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            applyMenuFilters();
        }

        function applyMenuFilters() {
            const kw = document.getElementById('menuFilterKeyword').value.toLowerCase().trim();
            const priceFilter = document.getElementById('menuFilterPrice').value;
            const sortOrder = document.getElementById('menuSortOrder').value;
            
            const tbody = document.getElementById('menuTableBody');
            const rows = Array.from(tbody.getElementsByClassName('dish-row'));
            
            rows.forEach(row => {
                const name = (row.getAttribute('data-name') || '').toLowerCase();
                const category = row.getAttribute('data-category') || '';
                const price = parseFloat(row.getAttribute('data-price')) || 0;
                
                let matchKeyword = !kw || name.includes(kw);
                let matchCategory = currentCategoryTab === 'all' || category === currentCategoryTab;
                let matchPrice = true;
                if (priceFilter === 'under35') matchPrice = price < 35000;
                else if (priceFilter === '35to55') matchPrice = price >= 35000 && price <= 55000;
                else if (priceFilter === 'above55') matchPrice = price > 55000;
                
                if (matchKeyword && matchCategory && matchPrice) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
            
            if (sortOrder !== 'default') {
                rows.sort((a, b) => {
                    if (sortOrder === 'price-asc') return (parseFloat(a.getAttribute('data-price')) || 0) - (parseFloat(b.getAttribute('data-price')) || 0);
                    if (sortOrder === 'price-desc') return (parseFloat(b.getAttribute('data-price')) || 0) - (parseFloat(a.getAttribute('data-price')) || 0);
                    if (sortOrder === 'name-asc') return (a.getAttribute('data-name') || '').localeCompare(b.getAttribute('data-name') || '');
                    return 0;
                });
                rows.forEach(r => tbody.appendChild(r));
            }
        }
    </script>
</body>
</html>
